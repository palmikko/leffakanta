<!DOCTYPE html>
<html>

<head>
  <title>Leffakanta</title>
</head>

<body>
  <h1> Leffakanta </h1>

    {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id-numerosi on {{ session.user_id }}
  </p>
    {% endif %}

  <p>
    <a href="/login">Kirjaudu</a>
    <a href="/register">Luo tunnus</a>
  </p>

  <p>
    <a href="/new_movie">Lisää elokuva</a>
  </p>

  <h2>Elokuvat</h2>
  <ul>
    {% for movie in movies %}
    <li><a href="/movie/{{ movie.id }}">{{ movie.title }}</a></li>
    {% endfor %}
  </ul>
</body>

</html>
