<!DOCTYPE html>
<html>

<head>
  <title>Lisää elokuva</title>
</head>

<body>
  <h1>Lisää elokuva</h1> 
  <form action="/create_movie" method="post">
    <p>
      Elokuvan nimi: <br />
      <input type="text" name="title" maxlength="50" required />
    </p>
    <p>
      Genre: <br />
      <input type="text" name="genre" maxlength="50" required />
    </p>
    <p>
      Kesto minuutteina: <br />
      <input type="number" name="duration" required />
    </p>
    <p>
      Arvosana: <br />
      <select name="grade">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </p>
    <p>
      Kieli: <br />
      <select name="language">
        <option value="Suomi">Suomi</option>
        <option value="Englanti">Englanti</option>
        <option value="Ruotsi">Ruotsi</option>
        <option value="Ranska">Ranska</option>
        <option value="Muu">Muu</option>
      </select>
    </p>
    <input type="submit" value="Lisää elokuva" />
  </form>
</body>

</html>
